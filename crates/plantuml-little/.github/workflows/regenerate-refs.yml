name: Regenerate reference SVGs

# Manually triggered workflow that regenerates the entire
# tests/reference/**/*.svg baseline on Ubuntu (where Java PlantUML resolves
# `sans-serif` to DejaVu Sans via fontconfig, matching plantuml-little's
# Rust-side metrics in src/font_data.rs).
#
# The pipeline funnels Java PlantUML through the shared-wasm Graphviz
# wrapper (scripts/wasm-dot-wrapper.sh → @kookyleo/graphviz-anywhere-web)
# so Graphviz output is byte-identical to what the Rust suite sees.
#
# Runner is pinned to ubuntu-24.04 (noble) so the system fontconfig
# stays stable across reruns. fonts-dejavu-extra is installed
# alongside -core: it ships DejaVuSans-Oblique.ttf, which Java's
# `Dialog.italic` resolves to. plantuml-little's Rust side embeds the
# matching Oblique metric tables in src/font_data.rs (regenerated via
# tools/gen_font_data.py), so italic strings compare byte-exact.
#
# Output: uploaded as `plantuml-reference-svgs` artifact. Download,
# extract into tests/reference/, commit.

on:
  workflow_dispatch:
    inputs:
      plantuml_version:
        description: PlantUML jar version to download
        required: true
        default: "1.2026.2"

jobs:
  regenerate:
    name: Regenerate reference SVGs (Linux + DejaVu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install DejaVu fonts (core + extra for Oblique italic)
        # fonts-dejavu-extra ships DejaVuSans-Oblique.ttf so Java's
        # `Dialog.italic` resolves to real italic glyph metrics that
        # match the Oblique tables baked into src/font_data.rs.
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core fonts-dejavu-extra fontconfig
          fc-cache -f
          fc-list | grep -i dejavu | head -10

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tests/support npm deps
        run: |
          cd tests/support
          npm install

      - name: Download plantuml.jar
        run: |
          mkdir -p /tmp/plantuml-cache
          curl -fL -o /tmp/plantuml-cache/plantuml-${{ inputs.plantuml_version }}.jar \
            https://github.com/plantuml/plantuml/releases/download/v${{ inputs.plantuml_version }}/plantuml-${{ inputs.plantuml_version }}.jar
          ls -lh /tmp/plantuml-cache/

      - name: Verify Java sees DejaVu as sans-serif
        run: |
          cat > /tmp/FontProbe.java <<'EOF'
          import java.awt.*;
          import java.awt.font.FontRenderContext;
          import java.awt.geom.Rectangle2D;
          import java.awt.image.BufferedImage;
          public class FontProbe {
            public static void main(String[] a) {
              BufferedImage img = new BufferedImage(1,1,BufferedImage.TYPE_INT_ARGB);
              Graphics2D g = img.createGraphics();
              g.setRenderingHint(RenderingHints.KEY_FRACTIONALMETRICS, RenderingHints.VALUE_FRACTIONALMETRICS_ON);
              FontRenderContext frc = g.getFontRenderContext();

              Font fb = new Font("sans-serif", Font.BOLD, 14);
              System.out.println("sans-serif BOLD resolves to: " + fb.getFontName());
              Rectangle2D r = fb.getStringBounds("System in focus", frc);
              System.out.printf("Width of 'System in focus' @14pt bold (frac) = %.4f%n", r.getWidth());
              // Expect DejaVu Sans Bold => 125.xxx. If Helvetica/Arial => 110.

              Font fi = new Font("sans-serif", Font.ITALIC, 14);
              System.out.println("sans-serif ITALIC resolves to: " + fi.getFontName());
              Rectangle2D ri = fi.getStringBounds("«archimate-node»", frc);
              System.out.printf("italic 'archimate-node' (frac) = %.4f%n", ri.getWidth());
              // Expect DejaVu Sans Oblique => 128.3857. Plain (no Oblique
              // installed) gives 128.2354 and would mismatch the Rust side.

              Font fp = new Font("sans-serif", Font.PLAIN, 14);
              Rectangle2D rp = fp.getStringBounds("«archimate-node»", frc);
              System.out.printf("plain 'archimate-node' (frac)  = %.4f%n", rp.getWidth());

              System.out.println("java.version: " + System.getProperty("java.version"));
              System.out.println("java.vendor:  " + System.getProperty("java.vendor"));
              System.out.println("java.home:    " + System.getProperty("java.home"));

              for (String s : GraphicsEnvironment.getLocalGraphicsEnvironment().getAvailableFontFamilyNames())
                if (s.toLowerCase().contains("dejavu")) System.out.println("  family: " + s);
            }
          }
          EOF
          javac -d /tmp /tmp/FontProbe.java
          java -cp /tmp FontProbe

      - name: Regenerate reference SVGs via shared-wasm pipeline
        env:
          PLANTUML_LITTLE_REF_BACKEND: wasm
        run: |
          bash tests/generate_reference.sh /tmp/plantuml-cache/plantuml-${{ inputs.plantuml_version }}.jar

      - name: Stamp VERSION metadata
        run: |
          cat > tests/reference/VERSION <<EOF
          plantuml_jar: plantuml-${{ inputs.plantuml_version }}.jar (from github.com/plantuml/plantuml releases)
          java_version: $(java -version 2>&1 | head -1)
          graphviz_backend: @kookyleo/graphviz-anywhere-web (wasm, Graphviz 14.1.5 + libexpat)
          font_stack: DejaVu Sans via fontconfig (fonts-dejavu-core)
          regenerated_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          wrapper: scripts/wasm-dot-wrapper.sh
          runner: ubuntu-latest ($(uname -a))
          EOF
          cat tests/reference/VERSION

      - name: Count generated references
        run: |
          echo "SVG count:"
          find tests/reference -name '*.svg' | wc -l

      - name: Upload reference artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantuml-reference-svgs
          path: |
            tests/reference/**/*.svg
            tests/reference/VERSION
          retention-days: 14
          if-no-files-found: error
