name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y libstdc++6 libexpat1 zlib1g
      - run: cargo clippy --all-targets -- -D warnings

  test-lib:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y libstdc++6 libexpat1 zlib1g
      - run: cargo test --lib

  test-reference:
    name: Reference Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install runtime deps + DejaVu fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libstdc++6 libexpat1 zlib1g fonts-dejavu-core fontconfig
          fc-cache -f
      - name: Install tests/support npm deps (for wasm backend)
        run: |
          cd tests/support
          npm ci
      - name: Run reference tests with baseline check (wasm backend)
        run: ./scripts/check_reference_failures.sh
        env:
          PLANTUML_LITTLE_TEST_BACKEND: wasm

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y libstdc++6 libexpat1 zlib1g
      - run: cargo test --test integration

  build-release:
    name: Release Build
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, test-lib, test-reference, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y libstdc++6 libexpat1 zlib1g
      - run: cargo build --release
      - name: Binary size
        run: ls -lh target/release/plantuml-little

  build-wasm:
    name: Build @kookyleo/plantuml-little-web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"
      - name: Build wasm
        working-directory: packages/web
        run: |
          wasm-pack build --target bundler --out-dir dist/wasm --out-name plantuml_little_web
          rm -f dist/wasm/package.json dist/wasm/.gitignore dist/wasm/README.md
      - name: Build TypeScript wrapper
        working-directory: packages/web
        run: |
          npm install --no-audit --no-fund
          npm run build:ts
      - name: Wasm binary size
        run: ls -lh packages/web/dist/wasm/plantuml_little_web_bg.wasm
