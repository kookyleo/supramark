packages:
  - 'packages/core'
  - 'packages/cli'
  - 'packages/engines'
  - 'packages/renderers/*'
  - 'packages/features/core-markdown'
  - 'packages/features/main/*'
  - 'packages/features/containers/*'
  - 'packages/features/diagrams/*'
  - 'packages/features/cards/*'
  # examples/* — explicit per-example listing. react-native unblocked
  # in 2026-05 by the cross-target graphviz-anywhere 0.2.1 + the
  # @kookyleo/supramark-<engine>-native-rn wrappers (this workspace
  # tree picks them up via crates/*/packages/react-native below).
  - 'examples/react-native'
  - 'examples/react-web-csr'
  # Vendored wasm-bindgen wrapper packages from subtree-merged crates.
  # Resolves @kookyleo/{plantuml,d2,mermaid}-little-web and
  # @kookyleo/graphviz-anywhere-{web,rn} to in-tree paths instead of
  # the npm registry — keeping supramark self-contained.
  # The wrappers ship source-only; run `bun run build:wasm` (which
  # invokes wasm-pack + tsc per package) before consuming them.
  - 'crates/*/packages/web'
  - 'crates/*/packages/react-native'
  # vison's renderers live one directory deeper than the *-little
  # convention. Explicit globs because there is no shared parent path
  # that selects only these two without sweeping in unrelated things.
  - 'crates/vison/vison-renderers/web'
  - 'crates/vison/vison-renderers/rn'
