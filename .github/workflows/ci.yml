name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # License compliance — REUSE spec + cargo-deny over the Rust workspace.
  # The workspace-internal SPDX field check runs in the test job
  # (`bun run license:check`); this job covers REUSE-spec headers and
  # the Rust dependency graph.
  license:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # Graphviz upstream is intentionally not pulled

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reuse
        run: pipx install reuse

      - name: REUSE lint
        run: reuse lint
        continue-on-error: true  # warn-only until per-file SPDX headers land

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny check
        run: cargo deny check

  # Code quality checks and tests
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: License compliance (workspace SPDX)
        run: bun run license:check

      - name: Setup Rust toolchain (for wasm builds)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build in-tree wasm packages
        run: bun run build:wasm

      - name: Run tests
        run: bun run test:core -- --coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage/coverage-final.json
          flags: core
          name: core-coverage
          fail_ci_if_error: false

      - name: Build packages
        run: bun run build

      - name: Quality check
        if: matrix.node-version == '20.x'
        run: bun run quality

  # Generate and deploy API documentation
  docs:
    name: Generate & Deploy Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: Generate API docs
        run: bun run --filter @supramark/core docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/core/docs/api
          destination_dir: api
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: update API documentation'
