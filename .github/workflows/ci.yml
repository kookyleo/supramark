name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # License compliance — REUSE spec + cargo-deny over the Rust workspace.
  # The workspace-internal SPDX field check runs in the test job
  # (`bun run license:check`); this job covers REUSE-spec headers and
  # the Rust dependency graph.
  license:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # Graphviz upstream is intentionally not pulled

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reuse
        run: pipx install reuse

      - name: REUSE lint
        run: reuse lint
        continue-on-error: true  # warn-only until per-file SPDX headers land

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny check
        run: cargo deny check

  # Fast (syntactic) ESLint over the whole repo plus the feature linter.
  # The type-aware pass runs in the test job after the build.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: ESLint + feature linter
        run: bun run lint

  # Code quality checks and tests
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: License compliance (workspace SPDX)
        run: bun run license:check

      - name: Setup Rust toolchain (for wasm builds)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build in-tree wasm packages
        run: bun run build:wasm

      - name: Run core tests (coverage)
        run: bun run test:core -- --coverage

      - name: Run workspace tests (features / renderers / engines)
        run: bun run --filter '@supramark/feature-*' --filter '@supramark/rn' --filter '@supramark/engines' --if-present test

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage/coverage-final.json
          flags: core
          name: core-coverage
          fail_ci_if_error: false

      - name: React Native package tests (native-module resolution)
        run: |
          for pkg in graphviz-anywhere d2-little mermaid-little plantuml-little; do
            echo "::group::$pkg resolve-native"
            (cd "crates/$pkg/packages/react-native" && bun test)
            echo "::endgroup::"
          done

      - name: Build packages
        run: bun run build

      - name: Type-aware lint
        # Runs after the build so the per-package type checker resolves the
        # same project graph as the build. Single matrix entry is enough.
        if: matrix.node-version == '20.x'
        run: bun run lint:types

      - name: Quality check
        if: matrix.node-version == '20.x'
        run: bun run quality

  # Host-side native bridge tests (JNI string/handle marshalling) — run on a
  # host JVM with no Android NDK, emulator or gradle. Only d2 and mermaid run
  # here: their cargo crates are self-contained. graphviz-anywhere and plantuml
  # are excluded — graphviz's host static lib must be built from Graphviz source
  # (slow), and plantuml-native transitively depends on the graphviz-anywhere
  # crate (PlantUML embeds dot), whose build.rs needs a prebuilt graphviz lib
  # not present on a clean CI runner. Their JNI host tests and the iOS XCTest
  # stubs (which need a macOS runner) run out-of-band via the scripts under
  # packages/react-native.
  native-host-tests:
    name: Native host tests (JNI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run JNI host bridge tests
        run: |
          for pkg in d2-little mermaid-little; do
            echo "::group::$pkg JNI host test"
            crates/$pkg/packages/react-native/scripts/test-android-jni.sh
            echo "::endgroup::"
          done

